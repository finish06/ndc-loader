name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: GitHub Pages
    # GitHub Pages (configure-pages / upload-pages-artifact / deploy-pages and the
    # github-pages environment) only exists on GitHub. github.server_url is
    # 'https://github.com' on GitHub and the Gitea instance URL on Gitea Actions,
    # so on Gitea this job is skipped (the run shows as skipped, not failed) while
    # remaining fully intact on GitHub.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
