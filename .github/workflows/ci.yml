name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ndc
          POSTGRES_PASSWORD: ndc
          POSTGRES_DB: ndc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ndc -d ndc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -cover -coverprofile=coverage.out ./internal/...

      - name: Integration tests
        env:
          DATABASE_URL: postgres://ndc:ndc@localhost:5432/ndc?sslmode=disable
        run: go test -tags=integration -race ./tests/integration/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o ndc-loader ./cmd/ndc-loader

  publish:
    name: Publish
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=beta-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: dockerhub.calebdunn.tech
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beta
        if: steps.version.outputs.is_release == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            dockerhub.calebdunn.tech/finish06/rx-dag:beta
            ghcr.io/finish06/rx-dag:beta

      - name: Trigger staging deploy
        id: deploy
        if: steps.version.outputs.is_release == 'false' && success()
        run: |
          BODY='{"app":"rx-dag","ref":"${{ github.ref }}","sha":"${{ github.sha }}","tag":"${{ steps.version.outputs.tag }}"}'
          SIGNATURE="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $NF}')"
          echo "Triggering staging deploy..."
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
            -X POST "${{ secrets.STAGING_WEBHOOK_URL }}/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY")
          echo "Deploy response (HTTP $HTTP_CODE):"
          cat /tmp/deploy-response.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Staging deploy returned HTTP $HTTP_CODE"
            echo "deploy_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Build and push release
        if: steps.version.outputs.is_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            dockerhub.calebdunn.tech/finish06/rx-dag:${{ steps.version.outputs.tag }}
            dockerhub.calebdunn.tech/finish06/rx-dag:latest
            ghcr.io/finish06/rx-dag:${{ steps.version.outputs.tag }}
            ghcr.io/finish06/rx-dag:latest
