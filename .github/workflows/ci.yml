name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Warm the Go toolchain into the runner's tool cache exactly once, before any
  # other job runs. On self-hosted runners that share a single host-mounted
  # /opt/hostedtoolcache across concurrently-running job containers (our
  # homelab-runner-1), two jobs both calling setup-go for an uncached version
  # would extract+copy Go into the SAME directory simultaneously and corrupt it
  # mid-copy — observed as `vet: open .../src/encoding/encoding.go: no such file`
  # and `fork/exec .../vet: no such file or directory`. Serializing the install
  # behind this job means lint/test find Go already cached (a cache hit, no
  # extraction) and can never race. On GitHub-hosted runners each job gets a
  # fresh VM with no shared cache, so this is just one fast extra job — behavior
  # is unchanged there.
  setup:
    name: Setup Go toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: golangci-lint
        run: golangci-lint run ./...

  docs:
    name: Swagger drift
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Pin swag to the version that produced the committed spec — an unpinned
      # (@latest) swag could itself reformat the output and report false drift.
      - name: Install swag (pinned)
        run: go install github.com/swaggo/swag/cmd/swag@v1.8.1

      - name: Regenerate swagger spec
        run: make docs

      # Fail the build if the regenerated spec differs from what's committed.
      # This is the guard for #11: the spec can no longer silently drift from
      # the route annotations and reach a release.
      - name: Fail on swagger drift
        run: |
          if ! git diff --exit-code -- docs/swagger; then
            echo "::error::docs/swagger is out of date — run 'make docs' and commit the result"
            exit 1
          fi

  test:
    name: Test
    needs: [setup]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ndc
          POSTGRES_PASSWORD: ndc
          POSTGRES_DB: ndc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ndc -d ndc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -cover -coverprofile=coverage.out ./internal/...

      - name: Integration tests
        env:
          DATABASE_URL: postgres://ndc:ndc@localhost:5432/ndc?sslmode=disable
        run: go test -tags=integration -race ./tests/integration/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o ndc-loader ./cmd/ndc-loader

  publish:
    name: Publish
    needs: [lint, test, docs]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=beta-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: dockerhub.calebdunn.tech
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # GitHub Container Registry (ghcr.io) and the built-in GITHUB_TOKEN only
      # exist on GitHub. github.server_url is 'https://github.com' on GitHub and
      # the Gitea instance URL on Gitea Actions, so this guard keeps the step
      # behaving exactly as before on GitHub and skips it on Gitea (which pushes
      # to dockerhub.calebdunn.tech only).
      - name: Login to GitHub Container Registry
        if: ${{ github.server_url == 'https://github.com' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beta
        if: steps.version.outputs.is_release == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          tags: |
            dockerhub.calebdunn.tech/finish06/rx-dag:beta
            ${{ github.server_url == 'https://github.com' && 'ghcr.io/finish06/rx-dag:beta' || '' }}

      - name: Notify Murph to deploy staging
        # Staging belongs to Gitea CI (it builds the :beta image). Skipped on
        # GitHub, where a v* tag drives the GitHub-built prod image instead.
        # Chain: CI -> friend.murph.task -> Murph rolls drugs-staging via
        # SSH+kubectl + fires friend.gracie.task for QA.
        if: steps.version.outputs.is_release == 'false' && success() && github.server_url != 'https://github.com'
        continue-on-error: true
        run: |
          TASK="rxdag-staging-${GITHUB_SHA:0:8}"
          INSTR="rx-dag :beta rebuilt by Gitea CI (commit ${GITHUB_SHA}). STAGING DEPLOY: (1) SSH kube1 then 'sudo k3s kubectl -n drugs-staging rollout restart deploy/rx-dag' and wait for rollout status. (2) Verify http://rx-dag-staging.10.17.2.213.nip.io/health returns 200 and /version is fresh. (3) Read the staging API key: sudo k3s kubectl -n drugs-staging get secret rx-dag-secret -o jsonpath={.data.api-keys} then base64 -d it. (4) Dispatch Gracie for QA via NATS js.publish to friend.gracie.task.rxdag-qa-<short-id> a JSON with task_id + instructions telling her to QA http://rx-dag-staging.10.17.2.213.nip.io sending header X-API-Key with that key, checking /health, /version, a search, /api/ndc/stats, and the openFDA endpoint, and return APPROVE or CHANGES-NEEDED, using your friend NATS user. Report on friend.murph.result. Local-only low-risk staging op, execute it."
          curl -fsS -X POST "${{ secrets.NATS_PUBLISH_URL }}/publish/friend.murph.task.$TASK" \
            -H "X-API-Key: ${{ secrets.NATS_MURPH_TASK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\":\"$TASK\",\"instructions\":\"$INSTR\"}"
          echo "Pinged Murph to deploy + QA staging ($TASK)"

      - name: Build and push release
        if: steps.version.outputs.is_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=v${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          tags: |
            dockerhub.calebdunn.tech/finish06/rx-dag:${{ steps.version.outputs.tag }}
            dockerhub.calebdunn.tech/finish06/rx-dag:latest
            ${{ github.server_url == 'https://github.com' && format('ghcr.io/finish06/rx-dag:{0}', steps.version.outputs.tag) || '' }}
            ${{ github.server_url == 'https://github.com' && 'ghcr.io/finish06/rx-dag:latest' || '' }}

      - name: Create GitHub Release
        if: ${{ steps.version.outputs.is_release == 'true' && github.server_url == 'https://github.com' }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES'
          ## Docker Images

          ```
          docker pull dockerhub.calebdunn.tech/finish06/rx-dag:${{ steps.version.outputs.tag }}
          docker pull ghcr.io/finish06/rx-dag:${{ steps.version.outputs.tag }}
          ```

          **Docs:** [Swagger UI](https://rx-dag.calebdunn.tech/swagger/) | [API Reference](https://github.com/finish06/ndc-loader/blob/main/docs/api/endpoints.md)
          NOTES
          gh release create v${{ steps.version.outputs.tag }} \
            --title "v${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
