name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ndc
          POSTGRES_PASSWORD: ndc
          POSTGRES_DB: ndc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ndc -d ndc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Unit tests
        run: go test -race -cover -coverprofile=coverage.out ./internal/...

      - name: Integration tests
        env:
          DATABASE_URL: postgres://ndc:ndc@localhost:5432/ndc?sslmode=disable
        run: go test -tags=integration -race ./tests/integration/...

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o ndc-loader ./cmd/ndc-loader

      - name: Build Docker image
        run: docker build -t ndc-loader:ci .

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: go vet
        run: go vet ./...
