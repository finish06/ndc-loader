networks:
  internal:
    name: internal
    driver: bridge
    external: true

services:
  ndc-loader-postgres:
    image: postgres:16-alpine
    container_name: ndc-loader-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ndc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ndc}
    volumes:
      - ndc-loader-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ndc} -d ${POSTGRES_DB:-ndc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped
    networks:
      - internal

  ndc-loader:
    image: dockerhub.calebdunn.tech/finish06/rx-dag:beta
    container_name: ndc-loader
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-ndc}:${POSTGRES_PASSWORD}@ndc-loader-postgres:5432/${POSTGRES_DB:-ndc}?sslmode=disable
      - LISTEN_ADDR=:8081
      - LOAD_SCHEDULE=${LOAD_SCHEDULE:-0 3 * * *}
      - API_KEYS=${API_KEYS}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=json
      - DOWNLOAD_DIR=/tmp/fda-data
      - DATASETS_FILE=/app/datasets.yaml
    depends_on:
      ndc-loader-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ndc-loader-pgadmin
    profiles:
      - debug
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      ndc-loader-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  ndc-loader-pg-data:
  pgadmin-data:
